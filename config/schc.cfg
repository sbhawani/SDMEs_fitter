# ============================================================
#  SCHC test configuration  —  strict helicity conservation
#
#  LT interference set to zero:  A_LT = A_LTi = 0
#  Im_LL and Im_TT are kept (they enter σ_LT' which is allowed
#  under SCHC — they represent gamma*_L → phi_L flip at the
#  nucleon vertex, not at the photon-meson vertex).
#
#  Under strict SCHC:
#    r^04_00  ≠ 0  (gives R = σ_L/σ_T)
#    r^1-1_1-1 = 0  (no cos(2φ_KK) in dσ)
#    r^1_10-1  = 0  (no cos(φ_KK) in dσ)
#
#  Compare output distributions with default.cfg to see the
#  effect of LT interference on angular moments.
# ============================================================

beamEnergy = 10.6
Q2min      = 1.0
Q2max      = 8.5
xBmin      = 0.08
xBmax      = 0.68
nEvents    = 50000
nScan      = 150000

# LL sector (unchanged)
A_L   = 30.0
b_L   = 4.25
n_L   = 1.0
Im_LL = 30.0

# TT sector (unchanged)
A_T     = 10.0
b_T     = 4.25
Delta_b = 1.5
n_T     = 1.0
Im_TT   = -5.0

# LT interference → OFF for strict SCHC test
A_LT  = 0.0
A_LTi = 0.0
b_LT  = 4.25
n_LT  = 1.0

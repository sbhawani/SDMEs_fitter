# ============================================================
#  phi_sdme_gen  —  default physics parameter configuration
#
#  To run:   ./phi_gen config/default.cfg > events.lund
#
# ── Parameter meaning ────────────────────────────────────────
#
#  dσ_L/dt  ~ A_L  × exp(b_L × t')   (L amplitude)
#  dσ_T/dt  ~ A_T  × exp(b_T × t')   (T amplitude)
#
#  BSA (A_LU) is driven by the Im parameters.
#  Physical target for phi at CLAS12: A_LU ~ 0.05–0.15
#
#  To keep BSA in the physical range, the Im parameters must
#  be small relative to the amplitudes.  The BSA is
#  approximately:
#
#    A_LU ~ Im_LL / (A_L + A_T)  × (prefactor ~ O(0.1–0.3))
#
#  With A_L=30, A_T=10:
#    Im_LL = 30  → A_LU ~ 0.75  ← SATURATED, do NOT use
#    Im_LL =  3  → A_LU ~ 0.075 ← physical
#
#  The closure test will only work if A_LU is well within
#  [0,1], giving the fitter a non-flat chi2 surface in Im.
#
# ── Beam and kinematic range ─────────────────────────────────
beamEnergy = 10.6
Q2min      = 1.0
Q2max      = 8.5
xBmin      = 0.08
xBmax      = 0.68
nEvents    = 500000
nScan      = 200000

# ── LL sector  (longitudinal photon → longitudinal phi) ──────
#
#   dσ_L/dt ~ A_L * exp(b_L * t')
#   Im_LL  ~ 0.1 × A_L  →  BSA contribution ~ 5–10%
#
A_L   = 30.0
b_L   = 4.25
n_L   = 1.0
Im_LL =  3.0

# ── TT sector  (transverse photon → transverse phi) ──────────
#
#   dσ_T/dt ~ A_T * exp(b_T * t')
#   Im_TT controls the TT-sector BSA contribution.
#
#   CONSTRAINT: |Im_TT| / A_T must be large enough to produce
#   a measurable BSA signal.  With A_T=10 and 500k events:
#     Im_TT = -0.5  → BSA ~ -0.05  → unmeasurable → fitter hits boundary
#     Im_TT = -2.0  → BSA ~ -0.20  → measurable   ← use this
#
A_T     = 10.0
b_T     = 4.25
Delta_b = 1.5
n_T     = 1.0
Im_TT   = -2.0

# ── LT interference  (SCHC violation; small at high Q²) ──────
#
#   A_LT / A_T ~ 0.2–0.3 is typical for phi near threshold
#   Set A_LT = A_LTi = 0 to enforce exact SCHC
#
A_LT  =  3.0
A_LTi = -2.0
b_LT  =  4.25
n_LT  =  1.0
